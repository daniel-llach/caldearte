name: Run Event Discovery

# Manual trigger only, deliberately — no `schedule:` yet. Run this by hand
# (Actions tab or `gh workflow run`) and check the resulting `events` rows
# for quality before committing to the automatic monthly cadence.
#
# Requires the TAVILY_API_KEY repo secret (searches run via Tavily, not
# Anthropic's web_search tool — see docs/region-discovery.md).
on:
  workflow_dispatch: {}

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Event Discovery
        run: pnpm --filter @caldearte/curator run discover-events
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
