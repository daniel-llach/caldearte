name: Run Event Discovery

# Weekly batch rollout (2026-07-17, see docs/region-discovery.md): every
# Monday, getUnitsDueForRun caps itself to `weekly_batch_size`
# (system_config, no redeploy to change) due comunas, oldest-last_run_at-
# first — rotates through all 346 seeded comunas forever, no reset logic
# needed. workflow_dispatch stays available for a manual run any time
# (e.g. right after raising weekly_batch_size, to see the new size take
# effect immediately instead of waiting for next Monday).
#
# Requires the TAVILY_API_KEY repo secret (searches run via Tavily, not
# Anthropic's web_search tool — see docs/region-discovery.md).
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * 1" # every Monday, 06:00 UTC

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Event Discovery
        run: pnpm --filter @caldearte/curator run discover-events
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
